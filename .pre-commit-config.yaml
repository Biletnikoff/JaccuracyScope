repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--select, "F,E722,B006", --fix]
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.1.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, refactor, docs, test, chore, ci, perf, safety]

  - repo: local
    hooks:
      - id: no-direct-thread-access
        name: Block direct thread attribute mutation
        entry: 'Threader\.thread\.\w+\s*='
        language: pygrep
        types: [python]
      - id: no-bare-except
        name: Block bare except clauses
        entry: 'except\s*:'
        language: pygrep
        types: [python]
      - id: no-profanity
        name: Block unprofessional comments
        entry: '(shit|fuck|wtf|cock|buttholes)'
        language: pygrep
        types: [python, c]
        args: [-i]
      - id: no-hardcoded-paths
        name: Block hardcoded Pi paths
        entry: '/home/pi/share/'
        language: pygrep
        types: [python, shell]
